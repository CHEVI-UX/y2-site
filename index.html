@page
@model IndexModel
@{
    Layout = null;
}

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>האתר של י2 הנדירותתת! 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&family=Varela+Round&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Varela Round', sans-serif;
            background: #ff85a2;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            right: 50px;
            color: white;
            font-size: 70px;
            font-family: 'Amatic SC', cursive;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            padding-top: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .left-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }

        .white-note {
            background: white;
            width: 420px;
            height: 420px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-radius: 5px;
            transform: rotate(-1.5deg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

            .white-note::before {
                content: "📌";
                position: absolute;
                top: -25px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 40px;
            }

        .right-side-scroll {
            flex: 1.5;
            height: 100vh;
            overflow-y: scroll;
            padding-top: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            .right-side-scroll::-webkit-scrollbar {
                width: 10px;
            }

            .right-side-scroll::-webkit-scrollbar-thumb {
                background: #ff4d6d;
                border-radius: 10px;
            }

        .girl-btn {
            background: white;
            border: none;
            padding: 18px;
            margin: 10px;
            border-radius: 25px;
            width: 500px;
            max-width: 90%;
            cursor: pointer;
            font-weight: bold;
            font-size: 24px;
            color: #ff4d6d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            flex-shrink: 0;
            text-align: center;
        }

            .girl-btn:hover {
                transform: scale(1.02);
                background: #fff0f3;
            }

        /* תיקון החלון הקופץ - מרכוז ומניעת חיתוך */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            max-height: 90vh; /* מונע מהחלון להיות גבוה מהמסך */
            overflow-y: auto; /* מוסיף גלילה פנימית אם יש המון טקסט */
            position: relative;
            text-align: right;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 5px solid #ffb3c1;
        }

        .close-x {
            position: absolute;
            top: 10px;
            left: 15px;
            cursor: pointer;
            font-size: 32px;
            color: #ff4d6d;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

            .form-group label {
                font-weight: bold;
                margin-bottom: 5px;
                color: #ff4d6d;
                font-size: 18px;
            }

            .form-group input, .form-group textarea {
                padding: 12px;
                border: 2px solid #ffb3c1;
                border-radius: 10px;
                font-family: inherit;
                font-size: 18px;
                width: 100%;
                box-sizing: border-box;
            }

        .save-btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 22px;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

            .save-btn:hover {
                background: #ff1a4d;
            }

        .note-header {
            font-family: 'Amatic SC', cursive;
            font-size: 45px;
            color: #ff4d6d;
            text-align: center;
            border-bottom: 3px solid #ffb3c1;
            margin-bottom: 20px;
        }

        #class-notes {
            flex: 1;
            border: none;
            outline: none;
            font-size: 26px;
            resize: none;
            background: transparent;
            font-family: 'Assistant', sans-serif;
        }

        .spacer {
            height: 150px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">האתר של י2 הנדירותתת! 👑</div>

    <div class="container">
        <div class="left-side">
            <div class="white-note">
                <div class="note-header">לוח מודעות</div>
                <textarea id="class-notes" placeholder="כתבו כאן הודעה לכולן..." oninput="saveGeneralNotes()"></textarea>
            </div>
        </div>

        <div class="right-side-scroll">
            <button class="girl-btn" onclick="openEdit('אילה איזן')">אילה איזן 🌀</button>
            <button class="girl-btn" onclick="openEdit('הדס בוקובסקי')">הדס בוקובסקי 🍭</button>
            <button class="girl-btn" onclick="openEdit('יעל בן משה')">יעל בן משה ⚡</button>
            <button class="girl-btn" onclick="openEdit('שירה בן שלום')">שירה בן שלום 💖</button>
            <button class="girl-btn" onclick="openEdit('אפרת גולדברג')">אפרת גולדברג 🌈</button>
            <button class="girl-btn" onclick="openEdit('לאה גולדברג')">לאה גולדברג💢</button>
            <button class="girl-btn" onclick="openEdit('שירה גרוס')">שירה גרוס 🎀</button>
            <button class="girl-btn" onclick="openEdit('צופיה וסרמן')">צופיה וסרמן 🍒</button>
            <button class="girl-btn" onclick="openEdit('רות ורנר')">רות ורנר 💫</button>
            <button class="girl-btn" onclick="openEdit('הדס ויסברג')">הדס ויסברג 🫧</button>
            <button class="girl-btn" onclick="openEdit('כבי וינגוט')">כבי וינגוט 🍫</button>
            <button class="girl-btn" onclick="openEdit('שירה זוין')">שירה זוין ❣️</button>
            <button class="girl-btn" onclick="openEdit('רעות זילברמן')">רעות זילברמן 🌞</button>
            <button class="girl-btn" onclick="openEdit('שיראל חלילי')">שיראל חלילי 🧁</button>
            <button class="girl-btn" onclick="openEdit('הדס טורשי')">הדס טורשי 😄</button>
            <button class="girl-btn" onclick="openEdit('נעמה טיקוצ\'ינסקי')">נעמה טיקוצ'ינסקי ✨</button>
            <button class="girl-btn" onclick="openEdit('נועה כהן')">נועה כהן 😎</button>
            <button class="girl-btn" onclick="openEdit('חני כץ')">חני כץ 🙃</button>
            <button class="girl-btn" onclick="openEdit('הדס כץ')">הדס כץ 🏵️</button>
            <button class="girl-btn" onclick="openEdit('טליה לוי')">טליה לוי 🩵</button>
            <button class="girl-btn" onclick="openEdit('פניני מושקביץ')">פניני מושקביץ 😺</button>
            <button class="girl-btn" onclick="openEdit('שירה נגר')">שירה נגר 💥</button>
            <button class="girl-btn" onclick="openEdit('שילת סויסה')">שילת סויסה 😊</button>
            <button class="girl-btn" onclick="openEdit('יעל ספיר')">יעל ספיר 💜</button>
            <button class="girl-btn" onclick="openEdit('מיכל עדני')">מיכל עדני 🌺</button>
            <button class="girl-btn" onclick="openEdit('אפרת פולסקי')">אפרת פולסקי 💚</button>
            <button class="girl-btn" onclick="openEdit('שולמית פינס')">שולמית פינס 🧡</button>
            <button class="girl-btn" onclick="openEdit('נועה צוברי')">נועה צוברי 🩷</button>
            <button class="girl-btn" onclick="openEdit('אורית קדוש')">אורית קדוש 🎖️</button>
            <button class="girl-btn" onclick="openEdit('אפרת קנדלר')">אפרת קנדלר 💛</button>
            <button class="girl-btn" onclick="openEdit('מעיין רסין')">מעיין רסין 💢</button>
            <button class="girl-btn" onclick="openEdit('אפרת רצון')">אפרת רצון ❣️</button>
            <button class="girl-btn" onclick="openEdit('אמונה שאבי')">אמונה שאבי 🤓</button>
            <div class="spacer"></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal()">&times;</span>
            <h2 id="edit-name" style="color:#ff4d6d; font-family:'Amatic SC'; font-size: 40px; margin: 0 0 20px 0; text-align: center;">פרטים</h2>
            <div class="form-group"><label>🎂 יומולדת לועזי:</label><input type="text" id="in-bday-loezi"></div>
            <div class="form-group"><label>📅 יומולדת עברי:</label><input type="text" id="in-bday-ivri"></div>
            <div class="form-group"><label>📱 טלפון:</label><input type="text" id="in-phone"></div>
            <div class="form-group"><label>🏠 כתובת:</label><input type="text" id="in-addr"></div>
            <div class="form-group"><label>📝 ועוד משהו:</label><textarea id="in-desc" rows="4"></textarea></div>
            <button class="save-btn" onclick="saveGirlData()">שמירה 💕</button>
        </div>
    </div>

    <script>
        let currentGirl = "";

        window.onload = function() {
            document.getElementById('class-notes').value = localStorage.getItem('globalNotes') || "";
        };

        function saveGeneralNotes() {
            localStorage.setItem('globalNotes', document.getElementById('class-notes').value);
        }

        function openEdit(name) {
            currentGirl = name;
            document.getElementById('edit-name').innerText = "הפרטים של " + name;
            let savedData = JSON.parse(localStorage.getItem('girl_' + name) || '{}');
            document.getElementById('in-bday-loezi').value = savedData.loezi || "";
            document.getElementById('in-bday-ivri').value = savedData.ivri || "";
            document.getElementById('in-phone').value = savedData.phone || "";
            document.getElementById('in-addr').value = savedData.addr || "";
            document.getElementById('in-desc').value = savedData.desc || "";
            document.getElementById('editModal').style.display = "flex";
        }

        function saveGirlData() {
            let data = {
                loezi: document.getElementById('in-bday-loezi').value,
                ivri: document.getElementById('in-bday-ivri').value,
                phone: document.getElementById('in-phone').value,
                addr: document.getElementById('in-addr').value,
                desc: document.getElementById('in-desc').value
            };
            localStorage.setItem('girl_' + currentGirl, JSON.stringify(data));
            alert("הפרטים נשמרו!");
            closeModal();
        }

        function closeModal() {
            document.getElementById('editModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('editModal')) closeModal();
        }
    </script>
</body>
</html>
